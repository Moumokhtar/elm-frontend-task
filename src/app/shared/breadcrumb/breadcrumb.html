<nav aria-label="breadcrumb" class="d-flex flex-wrap align-items-center" data-testid="breadcrumb">
  @for (item of items(); track $index; let i = $index; let isLast = $last) {
    @if (i > 0) {
      <i class="pi pi-angle-left text-muted small" aria-hidden="true"></i>
    }
    @if (!isLast) {
      <a
        class="text-muted text-decoration-none small lh-sm"
        [routerLink]="item.route!"
        data-testid="breadcrumb-item"
        >{{ item.label }}</a>
    } @else {
      <span class="small lh-sm elm-text-default" aria-current="page" data-testid="breadcrumb-item">{{ item.label }}</span>
    }
  }
</nav>
