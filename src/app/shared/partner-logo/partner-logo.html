@if (logoSrc()) {
  <div
    class="partner-logo__shell border shadow-none p-3 d-flex flex-column align-items-center gap-2 bg-white w-100"
    data-testid="partner-logo"
  >
    <div class="d-flex align-items-center justify-content-center partner-logo-container" data-testid="partner-logo-img">
      <img
        [src]="logoSrc()"
        [alt]="logoAlt()"
        class="mw-100 mh-100 w-auto h-auto d-block"
      />
    </div>
    @if (label()) {
      <span class="partner-logo__label small text-center" data-testid="partner-logo-label">{{ label() }}</span>
    }
  </div>
}
