<section
  class="page-feedback-bar__shell bg-white d-flex align-items-center"
  data-testid="page-feedback-bar"
  aria-label="تقييم الصفحة"
>
  <div
    class="page-feedback-bar__inner d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3 w-100 mx-auto px-3 px-md-0"
  >
    <div class="d-flex flex-column flex-sm-row flex-wrap align-items-sm-center gap-3 gap-sm-4 flex-grow-1 min-w-0">
      <p class="mb-0 text-start lh-base page-feedback-bar__question order-sm-1 flex-grow-1 flex-sm-grow-0">
        هل كانت هذه الصفحة مفيدة؟
      </p>
      <div class="d-flex gap-3 flex-shrink-0 order-sm-2">
        <p-button
          type="button"
          label="نعم"
          severity="success"
          [disabled]="buttonsLocked()"
          (onClick)="onYes()"
          data-testid="feedback-yes-btn"
          styleClass="flex-shrink-0"
        />
        <p-button
          type="button"
          label="لا"
          severity="success"
          [disabled]="buttonsLocked()"
          (onClick)="onNo()"
          data-testid="feedback-no-btn"
          styleClass="flex-shrink-0"
        />
      </div>
    </div>

    @if (showStatsLine()) {
      <p class="mb-0 small text-start page-feedback-bar__stats flex-shrink-0" data-testid="feedback-count">
        {{ yesPercent() }}% من المستخدمين قالوا نعم من {{ totalResponses() }} تعليقًا
      </p>
    }
  </div>
</section>
