<section class="page-placeholder mb-4">
  <h1>الصفحة الرئيسية</h1>
  <p lang="en">Home · placeholder</p>
</section>

<!--
  VISUAL QA ONLY — M3 SectionHeader (remove for M4 real composition):
  Temporary strip so humans can compare typography, spacing, and RTL layout to Figma before the
  Home Page milestone assembles real sections. Do not treat this as final page structure; delete
  this entire block (or gate behind a dev flag) when M4 ships.
-->
<section
  class="home-page__strip home-page__strip--muted"
  data-testid="home-visual-qa-section-header"
  aria-label="معاينة مؤقتة لترويسة القسم"
>
  <div class="home-page__strip-inner">
    <app-section-header
      title="قسم الخدمات"
      subtitle="نص تجريبي لمعاينة التنسيق والمسافات مقارنةً بـ Figma. سيُستبدل بمحتوى الصفحة الرئيسية الفعلي في مرحلة M4."
      actionLabel="عرض الكل"
      actionRoute="/service"
    />
  </div>
</section>

<!--
  VISUAL QA ONLY — M3 Breadcrumb (remove for M4 real composition):
  Temporary strip to verify separators, RTL, and links against Figma. Not final home structure.
-->
<section
  class="home-page__strip bg-white"
  data-testid="home-visual-qa-breadcrumb"
  aria-label="معاينة مؤقتة لمسار التنقل"
>
  <div class="home-page__strip-inner">
    <app-breadcrumb
      [items]="[
        { label: 'الرئيسية', route: '/' },
        { label: 'خدمة', route: '/service' },
        { label: 'معاينة' },
      ]"
    />
  </div>
</section>

<!--
  VISUAL QA ONLY — M3 ServiceCard (remove for M4 real composition):
  Sample card to compare with Figma service carousel item. Not final home structure.
-->
<section
  class="home-page__strip home-page__strip--muted"
  data-testid="home-visual-qa-service-card"
  aria-label="معاينة مؤقتة لبطاقة الخدمة"
>
  <div class="home-page__strip-inner">
    <div class="row g-4">
      <div class="col-12 col-sm-auto">
        <app-service-card
          title="عنوان البطاقة"
          description="نص إضافي لمحتوى البطاقة يظهر هنا بشكل مختصر لمعاينة التنسيق."
          [tags]="[
            { label: 'وسم', severity: 'success' },
            { label: 'وسم', severity: 'info' },
            { label: 'وسم', severity: 'secondary' },
          ]"
          primaryLabel="اجراء"
          secondaryLabel="اجراء ثانوي"
        />
      </div>
    </div>
  </div>
</section>

<!--
  VISUAL QA ONLY — M3 NewsCard (remove for M4 real composition):
  Sample card for typography, image crop, and RTL against Figma. Not final home structure.
-->
<section
  class="home-page__strip bg-white"
  data-testid="home-visual-qa-news-card"
  aria-label="معاينة مؤقتة لبطاقة الخبر"
>
  <div class="home-page__strip-inner">
    <div class="row g-4">
      <div class="col-12 col-md-6 col-xl-4">
        <app-news-card
          imageSrc="/images/news-card-placeholder.jpg"
          imageAlt="صورة الغلاف — معاينة من Figma (2036:65728)"
          imagePriority
          title="عنوان بطاقة الأخبار في سطرين"
          body="هنا يمكنك تضمين وصف موجز للعنوان في أربعة أسطر. هنا يمكنك تضمين وصف موجز للعنوان في أربعة أسطر."
        />
      </div>
    </div>
  </div>
</section>
